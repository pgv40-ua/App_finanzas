<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verum — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0C0C0E;
      --surface:  #141416;
      --surface-2: #1A1A1D;
      --border:   rgba(255,255,255,0.08);
      --border-h: rgba(255,255,255,0.16);
      --text-1:   #F4F4F5;
      --text-2:   #A1A1AA;
      --text-3:   #52525B;
      --accent:   #2DD4A0;
      --accent-h: #1DB58A;
      --accent-soft: rgba(45,212,160,0.12);
      --red:      #F87171;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .brand-logo-login { display: block; flex-shrink: 0; height: 38px; width: auto; }
    .brand-name { font-family: 'Geist', sans-serif; font-size: 15px; font-weight: 600; color: var(--text-1); }

    /* Tabs */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      background: transparent;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active { background: var(--surface-2); color: var(--text-1); }

    h1 {
      font-family: 'Geist', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle { font-size: 13px; color: var(--text-2); margin-bottom: 20px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-1);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }

    .field { margin-bottom: 14px; }

    /* Account-type cards */
    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .type-card {
      padding: 12px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
      font-family: inherit;
      color: var(--text-2);
    }
    .type-card:hover { border-color: var(--border-h); }
    .type-card.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--text-1);
    }
    .type-card .ico { font-size: 18px; display: block; margin-bottom: 4px; }
    .type-card .lbl { font-size: 11px; font-weight: 600; }

    .error-msg {
      display: none;
      font-size: 12px;
      color: var(--red);
      margin-top: 4px;
      padding: 8px 10px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 6px;
    }
    .error-msg.visible { display: block; }

    .success-msg {
      display: none;
      font-size: 12px;
      color: var(--accent);
      margin-top: 8px;
      padding: 10px 12px;
      background: var(--accent-soft);
      border: 1px solid rgba(45,212,160,0.2);
      border-radius: 6px;
    }
    .success-msg.visible { display: block; }
    .success-msg code { font-family: 'Geist', monospace; font-weight: 700; font-size: 14px; color: var(--accent); }

    button[type="submit"] {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      background: var(--accent);
      color: #001a10;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button[type="submit"]:hover { background: var(--accent-h); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.25);
      border-top-color: #001a10;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    button[type="submit"].loading span { display: none; }
    button[type="submit"].loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <img src="logo-transparent.png" alt="Verum" class="brand-logo-login">
      <span class="brand-name">Verum</span>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="login" type="button">Iniciar sesión</button>
      <button class="tab-btn" data-tab="register" type="button">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <section id="pane-login">
      <h1>Bienvenido de nuevo</h1>
      <p class="subtitle">Accede a tu panel de gastos</p>
      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" autocomplete="current-password" required />
        </div>
        <p class="error-msg" id="loginError"></p>
        <button type="submit" id="loginBtn">
          <span>Entrar</span>
          <div class="spinner"></div>
        </button>
      </form>
    </section>

    <!-- REGISTER -->
    <section id="pane-register" class="hidden">
      <h1>Crea tu cuenta</h1>
      <p class="subtitle">Elige el tipo de cuenta</p>

      <div class="type-grid" role="tablist">
        <button class="type-card active" data-type="particular" type="button">
          <span class="ico">👤</span><span class="lbl">Particular</span>
        </button>
        <button class="type-card" data-type="company" type="button">
          <span class="ico">🏢</span><span class="lbl">Empresa</span>
        </button>
        <button class="type-card" data-type="worker" type="button">
          <span class="ico">👥</span><span class="lbl">Trabajador</span>
        </button>
      </div>

      <form id="registerForm" autocomplete="off">
        <!-- Company-only field -->
        <div class="field hidden" id="fieldCompanyName">
          <label for="companyName">Nombre de la empresa</label>
          <input type="text" id="companyName" />
        </div>

        <div class="field">
          <label for="regName" id="regNameLabel">Tu nombre</label>
          <input type="text" id="regName" required />
        </div>

        <div class="field">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="regPassword">Contraseña (mín. 6 caracteres)</label>
          <input type="password" id="regPassword" autocomplete="new-password" minlength="6" required />
        </div>

        <!-- Worker-only field -->
        <div class="field hidden" id="fieldInvite">
          <label for="inviteCode">Código de invitación</label>
          <input type="text" id="inviteCode" placeholder="ej. A1B2C3D4" />
        </div>

        <p class="error-msg" id="registerError"></p>
        <p class="success-msg" id="registerSuccess"></p>
        <button type="submit" id="registerBtn">
          <span>Crear cuenta</span>
          <div class="spinner"></div>
        </button>
      </form>
    </section>
  </div>

  <script src="login.js"></script>
</body>
</html>
